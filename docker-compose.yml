services:
  broadlinkmanager:
    build: .
    container_name: broadlinkmanager
    restart: unless-stopped
    ports:
      - "7020:7020"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/codes.db
      - DISCOVERY_IP_LIST=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7020/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
