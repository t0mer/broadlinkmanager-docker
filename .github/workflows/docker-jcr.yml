name: JCR Docker Build

on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Read version
        id: ver
        run: echo "semver=$(tr -d ' \t\n\r' < broadlinkmanager/VERSION)" >> $GITHUB_OUTPUT

      - name: Compute registry host
        id: reg
        run: |
          REGISTRY="$(echo "${{ secrets.JCR_URL }}" | sed -E 's#^https?://##; s#/$##')"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Login to JFrog JCR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.registry }}
          username: ${{ secrets.JCR_USERNAME }}
          password: ${{ secrets.JCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.reg.outputs.registry }}/docker/broadlinkmanager:latest
            ${{ steps.reg.outputs.registry }}/docker/broadlinkmanager:${{ steps.ver.outputs.semver }}
